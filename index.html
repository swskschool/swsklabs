<!DOCTYPE html>
<html>
  <body>
    <h3>ระบบบันทึกข้อมูล</h3>
    <button onclick="sendData()">ทดสอบส่งข้อมูลเช็คอิน</button>

    <script>
      function sendData() {
        // ข้อมูลตามมาตรฐาน JSON
        const payload = {
          action: 'checkin',
          student_id: '67001',
          name: 'สมชาย เรียนดี',
          class_level: 'ม.6/1',
          lab_name: 'Lab 01',
          checkin_date: new Date().toLocaleDateString('th-TH'),
          checkin_time: new Date().toLocaleTimeString('th-TH')
        };

        console.log('กำลังส่งข้อมูล...', payload);

        // ส่งไปยัง backend ผ่าน google.script.run
        google.script.run
          .withSuccessHandler(function(response) {
            if (response.status === 'success') {
              alert('สำเร็จ: ' + response.message);
            } else {
              alert('เกิดข้อผิดพลาด: ' + response.message);
            }
          })
          .withFailureHandler(function(err) {
            alert('ระบบล้มเหลว: ' + err);
          })
          .processData(payload);
      }
    </script>
  </body>
</html>
